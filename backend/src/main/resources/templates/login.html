<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - 수강신청 관리 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 전체 기본 배경 및 폰트 설정 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 화면 전체 높이를 차지하여 중앙 정렬 */
        }

        /* 로그인 폼 컨테이너 (작은 카드 스타일) */
        .login-container {
            background-color: #ffffff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 380px; /* 로그인 창은 좁은 것이 안정감을 줍니다 */
            box-sizing: border-box;
        }

        /* 제목 스타일 */
        h1 {
            color: #2c3e50;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-top: 0;
            margin-bottom: 10px;
        }

        /* 부제목 설명 */
        p.subtitle {
            color: #7f8c8d;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
            margin-top: 0;
        }

        /* 에러 메시지 상자 스타일 */
        .error-message {
            background-color: #fde8e8;
            color: #e74c3c;
            border: 1px solid #f8b4b4;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
            margin-bottom: 25px;
        }

        /* 입력 폼 그룹 영역 */
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 700;
            font-size: 14px;
        }

        /* 아이디/비밀번호 입력창 스타일 */
        input[type="text"],
        input[type="password"] {
            padding: 14px;
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
            background-color: #f8f9fa; /* 평소엔 약간 회색 배경 */
            width: 100%;
            box-sizing: border-box;
        }

        /* 입력창 포커스 효과 */
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #3498db;
            background-color: #ffffff; /* 클릭하면 흰색으로 전환 */
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        /* 로그인 버튼 스타일 */
        .btn-login {
            background-color: #3498db;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            font-family: inherit;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 2px 4px rgba(52, 152, 219, 0.2);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>🔐 관리자 로그인</h1>
        <p class="subtitle">시스템 접근을 위해 로그인해 주세요.</p>

        <div class="error-message" th:if="${errorMessage}" th:text="${errorMessage}">
            ⚠️ 로그인에 실패했습니다.
        </div>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>

            <button type="submit" class="btn-login">로그인</button>
        </form>
    </div>

</body>
</html>
