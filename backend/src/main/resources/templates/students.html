<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 관리 - 수강신청 관리 시스템</title>
    <!-- 구글 폰트 적용 (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 전체 기본 배경 및 폰트 설정 */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* 메인 컨테이너 (카드 스타일) */
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 800px;
        }

        /* 제목 스타일 */
        h1 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
        }

        h2 {
            color: #34495e;
            font-size: 20px;
            font-weight: 700;
            border-left: 4px solid #3498db;
            padding-left: 12px;
            margin-bottom: 20px;
            margin-top: 0;
        }

        /* 폼(Form) 스타일 */
        .form-container {
            background-color: #f8f9fa;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            color: #7f8c8d;
            font-weight: 700;
            font-size: 14px;
        }

        input[type="text"] {
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn-submit {
            background-color: #3498db;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            font-family: inherit;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
        }

        hr {
            border: none;
            height: 1px;
            background-color: #ecf0f1;
            margin: 40px 0;
        }

        /* 테이블(Table) 스타일 */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ecf0f1;
        }

        th {
            background-color: #f8f9fa;
            color: #2c3e50;
            font-weight: 700;
            font-size: 15px;
        }

        td {
            color: #34495e;
            font-size: 14px;
        }

        tbody tr:hover {
            background-color: #f4f7f6;
        }

        /* 메인으로 가기 버튼 */
        .btn-back {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #95a5a6;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background-color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>학생 관리</h1>

        <h2>학생 등록</h2>
        <div class="form-container">
            <form action="/students" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label for="studentNumber">학번</label>
                        <input type="text" id="studentNumber" name="studentNumber" placeholder="예: 202401459" required>
                    </div>

                    <div class="form-group">
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" placeholder="예: 김민경" required>
                    </div>

                    <div class="form-group">
                        <label for="department">학과</label>
                        <input type="text" id="department" name="department" placeholder="예: 컴퓨터공학과" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">등록하기</button>
            </form>
        </div>

        <hr>

        <h2>학생 목록</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>학번</th>
                        <th>이름</th>
                        <th>학과</th>
                        <th>등록일</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.id}">1</td>
                        <td th:text="${student.studentNumber}">202401459</td>
                        <td th:text="${student.name}">김민경</td>
                        <td th:text="${student.department}">컴퓨터공학과</td>
                        <td th:text="${student.createdAt}">2026-06-02</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div style="text-align: center;">
            <a href="/" class="btn-back">⬅ 메인으로 돌아가기</a>
        </div>
    </div>

</body>
</html>
